<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Filmes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f4f6f9;
    }

    .page-wrap {
      max-width: 980px;
    }
  </style>
</head>

<body>
  <main class="container py-5 page-wrap">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 mb-1">Cadastro de Filmes</h1>
        <p class="text-secondary mb-4">Preencha apenas os campos abaixo.</p>

        <form id="formFilme">
          <div class="row g-3">
            <div class="col-12">
              <label for="tituloFilme" class="form-label">Título do Filme</label>
              <input type="text" class="form-control" id="tituloFilme" name="tituloFilme"
                placeholder="Ex.: Cidade de Deus">
            </div>

            <div class="col-12">
              <label for="tituloOriginal" class="form-label">Título Original</label>
              <input type="text" class="form-control" id="tituloOriginal" name="tituloOriginal"
                placeholder="Ex.: City of God">
            </div>

            <div class="col-md-4">
              <label for="anoProducao" class="form-label">Ano de Produção</label>
              <input type="number" class="form-control" id="anoProducao" name="anoProducao" placeholder="Ex.: 2024">
            </div>

            <div class="col-md-4">
              <label for="dataLancamento" class="form-label">Data de Lançamento</label>
              <input type="date" class="form-control" id="dataLancamento" name="dataLancamento">
            </div>

            <div class="col-md-4">
              <label for="duracaoMinutos" class="form-label">Duração (Minutos)</label>
              <input type="number" class="form-control" id="duracaoMinutos" name="duracaoMinutos"
                placeholder="Ex.: 120">
            </div>

            <div class="col-md-6">
              <label for="generoPrincipal" class="form-label">Gênero Principal</label>
              <select class="form-select" id="generoPrincipal" name="generoPrincipal">
                <option selected value="">Selecione</option>
                <option>Ação</option>
                <option>Aventura</option>
                <option>Comédia</option>
                <option>Drama</option>
                <option>Ficção Científica</option>
                <option>Romance</option>
                <option>Suspense</option>
                <option>Terror</option>
                <option>Documentário</option>
                <option>Animação</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="subgenero" class="form-label">Subgênero</label>
              <select class="form-select" id="subgenero" name="subgenero">
                <option selected value="">Selecione</option>
                <option>Crime</option>
                <option>Fantasia</option>
                <option>Mistério</option>
                <option>Biografia</option>
                <option>Musical</option>
                <option>Guerra</option>
                <option>Esporte</option>
                <option>Família</option>
                <option>Psicológico</option>
                <option>Super-herói</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="classificacao" class="form-label">Classificação Indicativa</label>
              <select class="form-select" id="classificacao" name="classificacao">
                <option selected value="">Selecione</option>
                <option>Livre</option>
                <option>10</option>
                <option>12</option>
                <option>14</option>
                <option>16</option>
                <option>18</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="paisOrigem" class="form-label">País de Origem</label>
              <select class="form-select" id="paisOrigem" name="paisOrigem">
                <option selected value="">Selecione</option>
                <option>Brasil</option>
                <option>Estados Unidos</option>
                <option>Reino Unido</option>
                <option>França</option>
                <option>Alemanha</option>
                <option>Espanha</option>
                <option>Itália</option>
                <option>Canadá</option>
                <option>Argentina</option>
                <option>Japão</option>
                <option>Coreia do Sul</option>
                <option>Índia</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="idiomaOriginal" class="form-label">Idioma Original</label>
              <select class="form-select" id="idiomaOriginal" name="idiomaOriginal">
                <option selected value="">Selecione</option>
                <option>Português</option>
                <option>Inglês</option>
                <option>Espanhol</option>
                <option>Francês</option>
                <option>Alemão</option>
                <option>Italiano</option>
                <option>Japonês</option>
                <option>Coreano</option>
                <option>Mandarim</option>
                <option>Hindi</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="diretor" class="form-label">Diretor</label>
              <input type="text" class="form-control" id="diretor" name="diretor" placeholder="Ex.: Fernando Meirelles">
            </div>

            <div class="col-md-6">
              <label for="produtora" class="form-label">Produtora</label>
              <input type="text" class="form-control" id="produtora" name="produtora" placeholder="Ex.: O2 Filmes">
            </div>

            <div class="col-md-6">
              <label for="distribuidora" class="form-label">Distribuidora</label>
              <input type="text" class="form-control" id="distribuidora" name="distribuidora"
                placeholder="Ex.: Paris Filmes">
            </div>

            <div class="col-md-6">
              <label for="orcamento" class="form-label">Orçamento</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control" id="orcamento" name="orcamento" placeholder="0,00"
                  step="0.01">
              </div>
            </div>

            <div class="col-md-6">
              <label for="receitaBilheteria" class="form-label">Receita de Bilheteria</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" class="form-control" id="receitaBilheteria" name="receitaBilheteria"
                  placeholder="0,00" step="0.01">
              </div>
            </div>

            <div class="col-md-3">
              <label for="notaMedia" class="form-label">Nota Média</label>
              <input type="number" class="form-control" id="notaMedia" name="notaMedia" placeholder="0,0" step="0.1">
            </div>

            <div class="col-md-5">
              <label for="status" class="form-label">Status</label>
              <select class="form-select" id="status" name="status">
                <option selected value="">Selecione</option>
                <option>Em Produção</option>
                <option>Pós-Produção</option>
                <option>Lançado</option>
                <option>Cancelado</option>
                <option>Arquivado</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="streaming" class="form-label">Disponível para Streaming</label>
              <select class="form-select" id="streaming" name="streaming">
                <option selected value="">Selecione</option>
                <option>Sim</option>
                <option>Não</option>
              </select>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">Salvar Cadastro</button>
            <button type="reset" class="btn btn-outline-secondary">Limpar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('formFilme').addEventListener('submit', function(event) {
      //Não deixa enviar o formulário se houver erros de validação
      event.preventDefault();

      //Valores dos campos do formulário
      const tituloFilme = document.getElementById('tituloFilme').value.trim();
      const tituloOriginal = document.getElementById('tituloOriginal').value.trim();
      const anoProducao = document.getElementById('anoProducao').value;
      const dataLancamento = document.getElementById('dataLancamento').value;
      const duracaoMinutos = document.getElementById('duracaoMinutos').value;
      const generoPrincipal = document.getElementById('generoPrincipal').value;
      const classificacao = document.getElementById('classificacao').value;
      const paisOrigem = document.getElementById('paisOrigem').value;
      const idiomaOriginal = document.getElementById('idiomaOriginal').value;
      const diretor = document.getElementById('diretor').value.trim();
      const produtora = document.getElementById('produtora').value.trim();
      const distribuidora = document.getElementById('distribuidora').value.trim();
      const orcamento = document.getElementById('orcamento').value;
      const receitaBilheteria = document.getElementById('receitaBilheteria').value;
      const notaMedia = document.getElementById('notaMedia').value;
      const status = document.getElementById('status').value;

      //Ano atual e ano máximo permitido para validação do ano de produção
      const anoAtual = new Date().getFullYear();
      const anoMaximo = anoAtual + 5;

      // 1.
      if (tituloFilme === "") {
        alert("Erro: O Título do Filme é obrigatório e não pode conter apenas espaços.");
        return;
      }
      if (tituloFilme.length > 200) {
        alert("Erro: O Título do Filme deve ter no máximo 200 caracteres.");
        return;
      }

      // 2.
      if (tituloOriginal.length > 200) {
        alert("Erro: O Título Original deve ter no máximo 200 caracteres.");
        return;
      }

      // 3.
      if (anoProducao === "") {
        alert("Erro: O Ano de Produção é obrigatório.");
        return;
      }
      const anoNum = parseInt(anoProducao);
      if (anoNum < 1888 || anoNum > anoMaximo) {
        alert(`Erro: O Ano de Produção deve estar entre 1888 e ${anoMaximo}.`);
        return;
      }

      // 4.
      if (dataLancamento === "") {
        alert("Erro: A Data de Lançamento é obrigatória.");
        return;
      }

      // 5.
      if (duracaoMinutos === "") {
        alert("Erro: A Duração é obrigatória.");
        return;
      }
      const duracaoNum = parseInt(duracaoMinutos);
      if (duracaoNum < 1 || duracaoNum > 600) {
        alert("Erro: A Duração deve ser um número inteiro entre 1 e 600 minutos.");
        return;
      }

      // 6.
      if (generoPrincipal === "") {
        alert("Erro: Selecione um Gênero Principal válido.");
        return;
      }

      // 7.
      if (classificacao === "") {
        alert("Erro: Selecione uma Classificação Indicativa.");
        return;
      }

      // 8.
      if (paisOrigem === "") {
        alert("Erro: Selecione um País de Origem.");
        return;
      }

      // 9.
      if (idiomaOriginal === "") {
        alert("Erro: Selecione o Idioma Original.");
        return;
      }

      // 10.
      if (diretor === "") {
        alert("Erro: O campo Diretor é obrigatório.");
        return;
      }
      if (/^\d+$/.test(diretor)) {
        alert("Erro: O nome do Diretor não pode conter apenas números.");
        return;
      }
      if (diretor.length > 150) {
        alert("Erro: O nome do Diretor deve ter no máximo 150 caracteres.");
        return;
      }

      // 11.
      if (produtora === "") {
        alert("Erro: O campo Produtora é obrigatório.");
        return;
      }
      if (produtora.length > 200) {
        alert("Erro: O nome da Produtora deve ter no máximo 200 caracteres.");
        return;
      }

      // 12.
      if (distribuidora.length > 200) {
        alert("Erro: O nome da Distribuidora deve ter no máximo 200 caracteres.");
        return;
      }

      // 13.
      if (orcamento !== "" && parseFloat(orcamento) < 0) {
        alert("Erro: O Orçamento não pode ser um valor negativo.");
        return;
      }

      // 14.
      if (receitaBilheteria !== "" && parseFloat(receitaBilheteria) < 0) {
        alert("Erro: A Receita de Bilheteria não pode ser um valor negativo.");
        return;
      }

      // 15.
      if (notaMedia !== "") {
        const notaNum = parseFloat(notaMedia);
        if (notaNum < 0.0 || notaNum > 10.0) {
          alert("Erro: A Nota Média deve ser um valor decimal entre 0,0 e 10,0.");
          return;
        }
      }

      // 16.
      if (status === "") {
        alert("Erro: Selecione o Status atual do filme.");
        return;
      }

      alert("Sucesso! Todos os dados estão válidos e prontos para serem salvos.");
    });
  </script>
</body>

</html>
